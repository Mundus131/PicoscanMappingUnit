version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: picocan-backend:local
    container_name: picocan-backend
    restart: unless-stopped
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000","http://192.168.0.100:3000"]
    ports:
      - "8000:8000/tcp"
      - "2120:2120/tcp"
      - "2115:2115/udp"
      - "2116:2116/udp"
      - "2117:2117/udp"
      - "2118:2118/udp"
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
    networks:
      - picocan_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: picocan-frontend:local
    container_name: picocan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000/tcp"
    depends_on:
      - backend
    networks:
      - picocan_net

networks:
  picocan_net:
    driver: bridge

volumes:
  backend_logs:
  backend_data:
