version: "3.9"

services:
  backend:
    image: picocan-backend:arm64
    container_name: picocan-backend
    restart: unless-stopped
    # Linux only: best option for high-rate UDP streams.
    network_mode: host
    dns:
      - 192.168.0.1
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=INFO
      # Update to your UI host if needed.
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000","http://192.168.0.100:3000"]
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
      # optional: persistent scanner config from host
      # - ./backend/config/picoscans_config.json:/app/config/picoscans_config.json

  frontend:
    image: picocan-frontend:arm64
    container_name: picocan-frontend
    restart: unless-stopped
    dns:
      - 192.168.0.1
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3000:3000/tcp"
    depends_on:
      - backend
    networks:
      - picocan_net

networks:
  picocan_net:
    driver: bridge

volumes:
  backend_logs:
  backend_data:
